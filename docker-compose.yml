# Realtor 360 — Full Stack
#
# Usage:
#   docker-compose up -d          → start all services
#   docker-compose logs -f api    → follow API logs
#   docker-compose down -v        → tear down + remove volumes
#
# The iOS app connects to: http://<your-ip>:8000

services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: realtor
      POSTGRES_PASSWORD: realtor
      POSTGRES_DB: realtor360
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realtor -d realtor360"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible storage) ───────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── FastAPI Server ──────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://realtor:realtor@postgres:5432/realtor360
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
      S3_BUCKET: captures
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      WORLDLABS_API_KEY: ${WORLDLABS_API_KEY:-}
      WORLDLABS_BASE_URL: https://api.worldlabs.ai/marble/v1
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker ───────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://realtor:realtor@postgres:5432/realtor360
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
      S3_BUCKET: captures
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      WORLDLABS_API_KEY: ${WORLDLABS_API_KEY:-}
      WORLDLABS_BASE_URL: https://api.worldlabs.ai/marble/v1
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
